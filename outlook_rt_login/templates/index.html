<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Outlook RT Login 接码助手</title>
  <style>
    :root{color-scheme:dark;--bg:#07101d;--card:#111d31cc;--muted:#91a4c5;--text:#edf6ff;--line:#223654;--pri:#60a5fa;--ok:#34d399;--bad:#fb7185;--warn:#fbbf24}*{box-sizing:border-box}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial;background:radial-gradient(circle at 20% 0%,#1f4c7f 0,#07101d 46%,#050912 100%);color:var(--text)}.wrap{max-width:1200px;margin:auto;padding:30px 14px 70px}.hero{display:flex;gap:14px;align-items:center;margin-bottom:18px}.logo{font-size:42px}.title h1{font-size:30px;margin:0}.title p{margin:7px 0 0;color:var(--muted)}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 22px 70px #0006;backdrop-filter:blur(8px)}label{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}textarea,input{width:100%;background:#07101f;border:1px solid #2a4164;border-radius:14px;color:var(--text);padding:12px;outline:none}textarea{min-height:132px;resize:vertical}input[type=file]{padding:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:760px){.grid{grid-template-columns:1fr}}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{border:0;border-radius:13px;padding:12px 17px;background:linear-gradient(135deg,#60a5fa,#818cf8);color:white;font-weight:800;cursor:pointer}.btn.secondary{background:#17243a;border:1px solid #2b4265;color:#d9e8ff}.btn:disabled{opacity:.55;cursor:not-allowed}.hint{color:var(--muted);font-size:13px;line-height:1.55}.status{white-space:pre-wrap}.ok{color:var(--ok)}.bad{color:var(--bad)}.warn{color:var(--warn)}.pill{display:inline-block;border:1px solid #2b4265;border-radius:999px;padding:3px 8px;color:#b7c9e8;font-size:12px}.account{border-top:1px solid var(--line);padding:16px 0}.account:first-child{border-top:0}.account-title{font-size:18px;font-weight:900;margin-bottom:6px}.mail{border-top:1px dashed #223654;padding:13px 0 0;margin-top:12px}.meta{color:var(--muted);font-size:13px}.subject{font-size:16px;font-weight:800;margin:5px 0}.codes{display:flex;gap:8px;flex-wrap:wrap;margin:9px 0}.code{font-size:22px;font-weight:950;letter-spacing:1px;background:#052e2b;color:#6ee7b7;border:1px solid #176b5f;border-radius:11px;padding:7px 11px}.body{color:#d7e6fb;background:#07101f;border:1px solid #22314f;border-radius:13px;padding:12px;white-space:pre-wrap;max-height:230px;overflow:auto}.toolbar{justify-content:space-between}.small{font-size:12px}.copy{font-size:12px;padding:5px 8px;border-radius:8px;background:#12314d;border:1px solid #285176;color:#dff1ff;cursor:pointer}.rotated{margin:10px 0}.rotated textarea{min-height:74px}.errorbox{border:1px solid #7f1d1d;background:#2a1017;border-radius:12px;padding:10px;margin-top:8px;color:#fecdd3}.parse-errors{margin-top:10px}.summarybar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.exportbox{margin-top:12px}.exportbox textarea{min-height:110px}.export-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  </style>
</head>
<body><div class="wrap">
  <div class="hero"><div class="logo">📮</div><div class="title"><h1>Outlook RT Login 接码助手</h1><p>支持单个账号、多行粘贴、上传 TXT 批量读取。每行格式：<b>邮箱----密码----client_id----refresh_token</b></p></div></div>
  <div class="card">
    <label>账号信息（一行一个；密码字段仅兼容格式，本工具不会使用密码登录）</label>
    <textarea id="combos" autocomplete="off" spellcheck="false" placeholder="email1@outlook.com----password----client_id----refresh_token&#10;email2@outlook.com----password----client_id----refresh_token"></textarea>
    <div class="grid" style="margin-top:12px">
      <div><label>上传 TXT 文件（可包含多个账号，一行一个）</label><input id="txtFile" type="file" accept=".txt,text/plain" onchange="loadTxtFile(this)"></div>
      <div><label>关键词过滤（可空，如 verification / login / GitHub）</label><input id="keyword" placeholder="可不填"></div>
      <div><label>每个文件夹读取最近 N 封</label><input id="limit" type="number" value="10" min="1" max="100"></div>
      <div><label>批量上限</label><input value="单次最多 50 个账号" readonly></div>
    </div>
    <div class="row toolbar" style="margin-top:14px">
      <div class="row"><button class="btn" id="fetchBtn" onclick="fetchCodes()">获取验证码</button><button class="btn secondary" onclick="clearInput()">清空输入</button></div>
      <span class="hint">不落库、不保存；TXT 只在浏览器读取后发送本次请求。</span>
    </div>
  </div>
  <div class="card"><div id="status" class="status hint">等待输入。当前版本：{{ version }}</div><div id="exportArea"></div></div>
  <div class="card"><div class="row"><span class="pill">INBOX</span><span class="pill">Junk</span><span class="pill">TXT 批量</span><span class="pill">OAuth XOAUTH2</span><span class="pill">Win/Linux</span></div><div id="results"></div></div>
</div>
<script>
let lastBatchData=null;
function clearInput(){document.getElementById('combos').value='';document.getElementById('txtFile').value='';document.getElementById('results').innerHTML='';document.getElementById('exportArea').innerHTML='';lastBatchData=null;document.getElementById('status').textContent='已清空。'}
function loadTxtFile(input){const file=input.files&&input.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=()=>{const box=document.getElementById('combos'); box.value=(box.value.trim()?box.value.trim()+'\n':'')+String(reader.result||'').trim(); document.getElementById('status').innerHTML='<span class="ok">已读取 TXT：</span>'+escapeHtml(file.name)+'，请点获取验证码。';}; reader.onerror=()=>{document.getElementById('status').innerHTML='<span class="bad">TXT 读取失败。</span>';}; reader.readAsText(file,'utf-8');}
async function fetchCodes(){
  const btn=document.getElementById('fetchBtn'), st=document.getElementById('status'), res=document.getElementById('results');
  const combos=document.getElementById('combos').value.trim();
  if(!combos){st.innerHTML='<span class="bad">请先粘贴账号或上传 TXT。</span>';return;}
  btn.disabled=true;res.innerHTML='';document.getElementById('exportArea').innerHTML='';lastBatchData=null;st.textContent='正在批量获取 access_token、登录 Outlook IMAP、扫描邮件...';
  try{
    const r=await fetch('/api/batch-fetch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({combos,limit:Number(document.getElementById('limit').value||10),keyword:document.getElementById('keyword').value})});
    const data=await r.json();
    if(!r.ok||!data.ok){st.innerHTML='<span class="bad">失败：</span>'+escapeHtml(data.error||'未知错误')+renderParseErrors(data.parse_errors||[]);return;}
    lastBatchData=data;
    st.innerHTML='<span class="ok">成功。</span> '+escapeHtml(data.summary||'')+renderParseErrors(data.parse_errors||[]);
    renderExportArea(data);
    res.innerHTML=(data.results||[]).map(accountHtml).join('') || '<p class="hint">没有结果。</p>';
  }catch(e){st.innerHTML='<span class="bad">请求异常：</span>'+escapeHtml(String(e));}
  finally{btn.disabled=false;}
}
function accountHtml(a){
  if(!a.ok){return `<div class="account"><div class="account-title bad">${escapeHtml(a.email||('账号 '+a.index))} 失败</div><div class="errorbox">${escapeHtml(a.error||'未知错误')}</div></div>`}
  const rotated=a.refresh_token_rotated?`<div class="rotated"><div class="warn">refresh_token 已轮换，复制下面整行更新：</div><textarea readonly>${escapeHtml(a.new_combo||'')}</textarea><button class="copy" onclick="copyTextFromPrev(this)">复制整行</button></div>`:'';
  const mails=(a.mails||[]).map(mailHtml).join('') || '<p class="hint">没有匹配邮件。</p>';
  return `<div class="account"><div class="account-title">${escapeHtml(a.email)} <span class="pill">邮件 ${a.mail_count||0}</span> <span class="pill">验证码 ${a.code_count||0}</span></div>${rotated}${mails}</div>`;
}
function mailHtml(m){const codes=(m.codes||[]);return `<div class="mail"><div class="meta">${escapeHtml(m.mailbox)} · ${escapeHtml(m.date||'')} · ${escapeHtml(m.from||'')}</div><div class="subject">${escapeHtml(m.subject||'(No Subject)')}</div><div class="codes">${codes.length?codes.map(c=>`<span class="code">${escapeHtml(c)}</span><button class="copy" onclick="copyText('${escapeAttr(c)}')">复制</button>`).join(''):'<span class="hint">未识别到 4-8 位数字验证码</span>'}</div><div class="body">${escapeHtml(m.preview||'')}</div></div>`}
function renderParseErrors(errors){if(!errors.length)return '';return '<div class="parse-errors warn">有 '+errors.length+' 行被跳过：</div>'+errors.map(e=>`<div class="hint">第 ${escapeHtml(e.line)} 行：${escapeHtml(e.error)} ${escapeHtml(e.preview||'')}</div>`).join('')}
function buildExportLines(data, mode){const results=(data&&data.results)||[];if(mode==='rotated')return results.filter(r=>r.ok&&r.new_combo).map(r=>r.new_combo).join('\n');return results.map(r=>r.new_combo||findOriginalLine(r.email)||'').filter(Boolean).join('\n')}
function findOriginalLine(email){const target=String(email||'').toLowerCase();return document.getElementById('combos').value.split(/\r?\n/).map(x=>normalizeLine(x.trim())).find(x=>x && !x.startsWith('#') && x.split('----',1)[0].toLowerCase()===target)||''}
function normalizeLine(s){return String(s||'').replaceAll('————','----').replaceAll('———','----').replaceAll('——','----').replaceAll('－－','----')}
function renderExportArea(data){const rotatedCount=((data.results||[]).filter(r=>r.ok&&r.refresh_token_rotated)).length;const updated=buildExportLines(data,'updated');const rotated=buildExportLines(data,'rotated');document.getElementById('exportArea').innerHTML=`<div class="exportbox"><div class="summarybar"><span class="pill">轮换 ${rotatedCount} 个</span><span class="pill">成功 ${data.success||0} 个</span><span class="pill">失败 ${data.failed||0} 个</span></div><label style="margin-top:10px">导出：已自动把轮换后的 refresh_token 替换成新整行；未轮换账号保留原行</label><textarea id="exportText" readonly>${escapeHtml(updated)}</textarea><div class="export-actions"><button class="copy" onclick="copyExport('updated')">复制全部更新后账号</button><button class="copy" onclick="copyExport('rotated')">只复制已轮换账号</button><button class="copy" onclick="downloadExport('updated')">下载 updated.txt</button><button class="copy" onclick="downloadExport('rotated')">下载 rotated.txt</button></div></div>`}
function copyExport(mode){if(!lastBatchData)return;const text=buildExportLines(lastBatchData,mode);copyText(text);const box=document.getElementById('exportText');if(box)box.value=text}
function downloadExport(mode){if(!lastBatchData)return;const text=buildExportLines(lastBatchData,mode);const blob=new Blob([text+'\n'],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(mode==='rotated'?'rotated-refresh-token':'updated-accounts')+'-'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+'.txt';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function copyText(s){navigator.clipboard&&navigator.clipboard.writeText(s)}
function copyTextFromPrev(btn){const t=btn.previousElementSibling; if(t) copyText(t.value)}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function escapeAttr(s){return String(s).replace(/[\\']/g,'\\$&').replace(/\n/g,' ')}
</script></body></html>
